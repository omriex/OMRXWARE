name: Devast.io Auto Updater

on:
  schedule:
    # Runs every 5 minutes (GitHub’s minimum cron interval)
    - cron: '*/5 * * * *'
  workflow_dispatch:   # Allows you to trigger manually from the Actions tab

permissions:
  contents: write      # Required to commit and push changes

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Updater Script
        run: node update.js

      - name: Stage generated files
        run: git add devast-original.js devast-modded.js

      - name: Check if files changed
        id: changes
        run: |
          if git diff --quiet --staged; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push (if changed)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-update: New Devast.io client version detected"
          git push

      - name: Send Discord Notification (if changed)
        if: steps.changes.outputs.changed == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "**auto updated to latest game version**",
                 "embeds": [{
                   "title": "New Devast.io version deployed",
                   "description": "The client files have been updated to the latest game version.",
                   "color": 5763719,
                   "footer": { "text": "Updater workflow" }
                 }]
               }' \
               "$WEBHOOK_URL"
